apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend        
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ankushregmigg/backend:v1
          ports:
            - containerPort: 5050
          env:
            - name: MONGO_URI
              value: mongodb://mongodb:27017
   